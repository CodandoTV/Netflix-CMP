name: Popcorn

on:
  pull_request:
    branches: ["master"]
    paths:
      - "**/build-logic/**"
      - "**.kts"
      - "**/libs.versions.toml"

jobs:
  popcorn:
    runs-on: ubuntu-latest
    env:
      MOVIE_DB_API_TOKEN: ${{ secrets.MOVIE_DB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: ./.github/actions/java

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Popcorn
        uses: CodandoTV/popcorn-guineapig/.github/actions/popcorn@main
